name: CD - Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Build Space Invaders
        working-directory: games/space-invaders
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p site/games/space-invaders
          mkdir -p site/games/spaceword
          cp -r frontend/. site/
          cp -r games/space-invaders/build/. site/games/space-invaders/
          cp -r games/spaceword/. site/games/spaceword/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
