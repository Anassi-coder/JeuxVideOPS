name: CI Pipeline

on:
  push:
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  space-invaders:
    name: Space Invaders - Test & Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: games/space-invaders

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          cache-dependency-path: games/space-invaders/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: |
          echo "::group::Space Invaders Unit Tests"
          npm test -- --verbose 2>&1 | tee test-results.txt
          echo "::endgroup::"

      - name: Test summary
        if: always()
        run: |
          echo "## Space Invaders - Résultats des tests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat test-results.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Security audit
        run: |
          echo "::group::npm audit"
          npm audit --audit-level=high || true
          echo "::endgroup::"
          echo "## Audit de sécurité" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          npm audit --audit-level=high 2>&1 || true >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
